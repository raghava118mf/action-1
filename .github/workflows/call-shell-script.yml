name: Call Shell Script Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-shell-script:
    name: Run shell script to setup directory
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Make shell script executable
        run: chmod +x scripts/setup-directory.sh

      - name: Run the shell script
        run: ./scripts/setup-directory.sh
