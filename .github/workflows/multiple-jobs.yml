name: Multiple Jobs Example

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  # JOB 1: This job runs independently (no dependencies)
  job-one:
    name: Job 1 - Print Message
    runs-on: ubuntu-latest
    steps:
      - name: Print Job 1
        run: |
          echo "Job 1 is running!"
          echo "This job runs independently."

  # JOB 2: This job also runs independently (no dependencies)
  job-two:
    name: Job 2 - Print Date
    runs-on: ubuntu-latest
    steps:
      - name: Print current date
        run: |
          echo "Job 2 is running!"
          date

  # JOB 3: This job also runs independently (no dependencies)
  job-three:
    name: Job 3 - Print User
    runs-on: ubuntu-latest
    steps:
      - name: Print username
        run: |
          echo "Job 3 is running!"
          whoami

  # JOB 4: This job DEPENDS on job-one (waits for job-one to finish)
  job-four:
    name: Job 4 - Depends on Job 1
    runs-on: ubuntu-latest
    needs: job-one
    steps:
      - name: Print message
        run: |
          echo "Job 4 is running!"
          echo "Job 4 waits for Job 1 to finish first."

  # JOB 5: This job DEPENDS on multiple jobs (waits for all to finish)
  job-five:
    name: Job 5 - Depends on Job 2 and Job 3
    runs-on: ubuntu-latest
    needs: [job-two, job-three]
    steps:
      - name: Final message
        run: |
          echo "Job 5 is running!"
          echo "Job 5 waited for Job 2 and Job 3 to finish first."
