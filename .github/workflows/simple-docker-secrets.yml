name: Simple Docker Variables and Secrets

on:
  workflow_dispatch: {}

env:
  APP_NAME: sample-app
  APP_ENV: staging
  APP_VERSION: 1.0.0
  PORT: 8080

jobs:
  docker-demo:
    name: Docker demo with vars and secret
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ env.APP_VERSION }} \
            -t simple-docker-demo:latest .

      - name: Run Docker container with variables and secret
        env:
          SECRET_VALUE: ${{ secrets.MY_SECRET }}
        run: |
          docker run --rm \
            -e APP_NAME="${{ env.APP_NAME }}" \
            -e APP_ENV="${{ env.APP_ENV }}" \
            -e APP_VERSION="${{ env.APP_VERSION }}" \
            -e PORT="${{ env.PORT }}" \
            -e MESSAGE="Hello from GitHub Actions" \
            -e SECRET_VALUE="${SECRET_VALUE}" \
            simple-docker-demo:latest
