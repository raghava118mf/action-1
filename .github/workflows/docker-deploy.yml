name: Local Docker Build and Run Demo

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  APP_NAME: sample-app
  APP_ENV: staging
  APP_VERSION: 1.0.0
  PORT: 8080

jobs:
  docker-demo:
    name: Docker Build and Run Locally
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APP_VERSION="${{ env.APP_VERSION }}" \
            -t local-docker-demo:latest .

      - name: Run Docker container with variables and secret
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_ENV: ${{ env.APP_ENV }}
          APP_VERSION: ${{ env.APP_VERSION }}
          PORT: ${{ env.PORT }}
          SECRET_VALUE: ${{ secrets.MY_SECRET }}
        run: |
          docker run --rm \
            -e APP_NAME="${APP_NAME}" \
            -e APP_ENV="${APP_ENV}" \
            -e APP_VERSION="${APP_VERSION}" \
            -e PORT="${PORT}" \
            -e MESSAGE="Hello from GitHub Actions" \
            -e SECRET_VALUE="${SECRET_VALUE}" \
            local-docker-demo:latest
