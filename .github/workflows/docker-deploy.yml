name: Docker Build and Deploy Demo

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  REGISTRY: docker.io
  IMAGE_NAME: action-1-demo
  IMAGE_TAG: latest
  APP_NAME: sample-app
  APP_ENV: production
  APP_VERSION: 1.0.0
  PORT: 8080

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}

      - name: Save image name
        run: |
          echo "${{ env.IMAGE }}" > image-name.txt
          cat image-name.txt

      - name: Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: image-name.txt

  deploy:
    name: Deploy Job
    needs: build
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
      APP_NAME: ${{ env.APP_NAME }}
      APP_ENV: ${{ env.APP_ENV }}
      APP_VERSION: ${{ env.APP_VERSION }}
      PORT: ${{ env.PORT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build metadata
        uses: actions/download-artifact@v4
        with:
          name: build-metadata

      - name: Show downloaded metadata
        run: |
          echo "Downloaded image metadata:"
          cat image-name.txt

      - name: Log in to Docker registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Pull Docker image
        run: docker pull $IMAGE

      - name: Run Docker container
        run: |
          docker run --rm \
            -e APP_NAME="${APP_NAME}" \
            -e APP_ENV="${APP_ENV}" \
            -e APP_VERSION="${APP_VERSION}" \
            -e MESSAGE="Hello from deploy job" \
            $IMAGE
